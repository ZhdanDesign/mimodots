<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  font-size: 12px;
  background: #2c2c2c;
  color: #e0e0e0;
  padding: 12px;
}
h2 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.section { margin-bottom: 12px; }
.section-title {
  font-size: 10px; font-weight: 600; color: #999;
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
label { font-size: 11px; color: #999; min-width: 50px; }
input[type="range"] {
  flex: 1; height: 3px; -webkit-appearance: none;
  background: #505050; border-radius: 2px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: #e0e0e0; cursor: pointer;
}
.val { font-size: 11px; font-weight: 600; min-width: 30px; text-align: right; }
.btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 7px 10px; border: 1px solid #505050;
  border-radius: 4px; background: #383838; color: #e0e0e0;
  font-size: 11px; font-weight: 500; cursor: pointer;
}
.btn:hover { background: #444; }
.btn-primary { background: #4caf50; color: #fff; border-color: #4caf50; }
.btn-primary:hover { background: #43a047; }
.btn-group { display: flex; }
.btn-group .btn { border-radius: 0; margin-left: -1px; padding: 5px 8px; }
.btn-group .btn:first-child { border-radius: 3px 0 0 3px; margin-left: 0; }
.btn-group .btn:last-child { border-radius: 0 3px 3px 0; }
.btn-group .btn.active { background: #4caf50; color: #fff; border-color: #4caf50; z-index: 1; }
.color-swatch {
  width: 28px; height: 28px; border: 1px solid #505050;
  border-radius: 3px; cursor: pointer; position: relative; overflow: hidden;
}
.color-swatch input[type="color"] {
  position: absolute; top: -5px; left: -5px; width: 40px; height: 40px;
  border: none; cursor: pointer;
}
#preview {
  width: 100%; aspect-ratio: 1; background: #1a1a1a;
  border: 1px solid #505050; border-radius: 4px; margin-bottom: 4px;
}
#preview svg { width: 100%; height: 100%; }
.dim-label { font-size: 10px; color: #999; text-align: center; margin-bottom: 8px; }
#fileInput { display: none; }
</style>
</head>
<body>
<h2>Mimodots — Пиксельная сетка</h2>
<div class="section">
  <div class="section-title">Размер сетки</div>
  <div class="row">
    <label>Ширина</label>
    <input type="range" id="widthSlider" min="8" max="256" value="32">
    <span class="val" id="widthVal">32</span>
  </div>
  <div class="row">
    <label>Высота</label>
    <input type="range" id="heightSlider" min="8" max="256" value="32">
    <span class="val" id="heightVal">32</span>
  </div>
  <div class="row" style="margin-top:4px">
    <label>Формат</label>
    <div class="btn-group" style="flex:1">
      <button class="btn active" data-ratio="free" style="flex:1">Свободный</button>
      <button class="btn" data-ratio="square" style="flex:1">1:1</button>
    </div>
  </div>
</div>
<div class="section">
  <div class="section-title">Форма пикселей</div>
  <div class="btn-group">
    <button class="btn active" data-shape="square" style="flex:1">■ Квадрат</button>
    <button class="btn" data-shape="circle" style="flex:1">● Круг</button>
    <button class="btn" data-shape="hex" style="flex:1">⬡ Грань</button>
  </div>
</div>
<div class="section">
  <div class="section-title">Внешний вид</div>
  <div class="row">
    <label>Зазор</label>
    <input type="range" id="gapSlider" min="0" max="50" value="10">
    <span class="val" id="gapVal">10%</span>
  </div>
  <div class="row">
    <label>Цвет</label>
    <div class="color-swatch">
      <input type="color" id="colorPicker" value="#4caf50">
    </div>
    <span class="val" id="colorVal">#4caf50</span>
  </div>
</div>
<div class="section">
  <div class="section-title">Превью</div>
  <div id="preview"></div>
  <div class="dim-label" id="dimLabel">32 × 32</div>
</div>
<div class="section">
  <button class="btn" id="importBtn" style="margin-bottom:6px">📁 Импорт SVG</button>
  <input type="file" id="fileInput" accept=".svg,image/svg+xml">
  <button class="btn btn-primary" id="generateBtn">⚡ Создать сетку в документе</button>
</div>
<div class="section">
  <button class="btn" id="exportBtn">⬇ Экспорт как SVG</button>
</div>
<script src="./CSInterface.js"></script>
<script>
var csInterface = new CSInterface();

var state = { width: 32, height: 32, ratio: "free", shape: "square", gap: 10, color: "#4caf50" };

document.querySelectorAll("[data-ratio]").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll("[data-ratio]").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    state.ratio = btn.dataset.ratio;
    if (state.ratio === "square") {
      state.height = state.width;
      document.getElementById("heightSlider").value = state.height;
      document.getElementById("heightVal").textContent = state.height;
    }
    updateDim(); render();
  });
});

document.querySelectorAll("[data-shape]").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll("[data-shape]").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    state.shape = btn.dataset.shape;
    render();
  });
});

document.getElementById("widthSlider").addEventListener("input", function() {
  state.width = parseInt(this.value);
  document.getElementById("widthVal").textContent = state.width;
  if (state.ratio === "square") {
    state.height = state.width;
    document.getElementById("heightSlider").value = state.height;
    document.getElementById("heightVal").textContent = state.height;
  }
  updateDim(); render();
});

document.getElementById("heightSlider").addEventListener("input", function() {
  state.height = parseInt(this.value);
  document.getElementById("heightVal").textContent = state.height;
  if (state.ratio === "square") {
    state.width = state.height;
    document.getElementById("widthSlider").value = state.width;
    document.getElementById("widthVal").textContent = state.width;
  }
  updateDim(); render();
});

document.getElementById("gapSlider").addEventListener("input", function() {
  state.gap = parseInt(this.value);
  document.getElementById("gapVal").textContent = state.gap + "%";
  render();
});

document.getElementById("colorPicker").addEventListener("input", function() {
  state.color = this.value;
  document.getElementById("colorVal").textContent = state.color;
  render();
});

function updateDim() {
  document.getElementById("dimLabel").textContent = state.width + " \u00d7 " + state.height;
}

function render() {
  var cols = state.width, rows = state.height;
  var gapFrac = state.gap / 100;
  var ns = "http://www.w3.org/2000/svg";
  var cs = 10, pad = cs * gapFrac / 2, inner = cs - pad * 2;
  var svgW = cols * cs, svgH = rows * cs;

  var svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", "0 0 " + svgW + " " + svgH);

  var bg = document.createElementNS(ns, "rect");
  bg.setAttribute("width", svgW); bg.setAttribute("height", svgH); bg.setAttribute("fill", "#1a1a1a");
  svg.appendChild(bg);

  for (var x = 0; x <= cols; x++) {
    var l = document.createElementNS(ns, "line");
    l.setAttribute("x1", x*cs); l.setAttribute("y1", 0); l.setAttribute("x2", x*cs); l.setAttribute("y2", svgH);
    l.setAttribute("stroke", "rgba(255,255,255,0.08)"); l.setAttribute("stroke-width", "0.3");
    svg.appendChild(l);
  }
  for (var y = 0; y <= rows; y++) {
    var l2 = document.createElementNS(ns, "line");
    l2.setAttribute("x1", 0); l2.setAttribute("y1", y*cs); l2.setAttribute("x2", svgW); l2.setAttribute("y2", y*cs);
    l2.setAttribute("stroke", "rgba(255,255,255,0.08)"); l2.setAttribute("stroke-width", "0.3");
    svg.appendChild(l2);
  }

  for (var py = 0; py < rows; py++) {
    for (var px = 0; px < cols; px++) {
      var cx = px*cs + pad + inner/2, cy = py*cs + pad + inner/2;
      var el;
      if (state.shape === "square") {
        el = document.createElementNS(ns, "rect");
        el.setAttribute("x", px*cs+pad); el.setAttribute("y", py*cs+pad);
        el.setAttribute("width", inner); el.setAttribute("height", inner);
      } else if (state.shape === "circle") {
        el = document.createElementNS(ns, "circle");
        el.setAttribute("cx", cx); el.setAttribute("cy", cy); el.setAttribute("r", inner/2);
      } else {
        el = document.createElementNS(ns, "polygon");
        var pts = [];
        for (var i = 0; i < 6; i++) {
          var a = (Math.PI/3)*i - Math.PI/6;
          pts.push((cx+(inner/2)*Math.cos(a)).toFixed(2)+","+(cy+(inner/2)*Math.sin(a)).toFixed(2));
        }
        el.setAttribute("points", pts.join(" "));
      }
      if (el) { el.setAttribute("fill", state.color); svg.appendChild(el); }
    }
  }
  document.getElementById("preview").innerHTML = "";
  document.getElementById("preview").appendChild(svg);
}

function hexToRGB(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}

document.getElementById("generateBtn").addEventListener("click", function() {
  var cols = state.width, rows = state.height, cs = 10;
  var gapFrac = state.gap / 100, pad = cs * gapFrac / 2;
  var innerW = cs - pad*2, innerH = cs - pad*2;
  var rgb = hexToRGB(state.color);

  var script = "var doc = app.activeDocument;" +
    "if (!doc) { alert('\u041d\u0435\u0442 \u043e\u0442\u043a\u0440\u044b\u0442\u043e\u0433\u043e \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u0430'); }" +
    "else {" +
    "var layer = doc.activeLayer;" +
    "var g = layer.groupItems.add();" +
    "g.name = 'Pixel Grid " + cols + "x" + rows + "';" +
    "var fc = new RGBColor(); fc.red=" + rgb.r + "; fc.green=" + rgb.g + "; fc.blue=" + rgb.b + ";" +
    "for (var y=0; y<" + rows + "; y++) { for (var x=0; x<" + cols + "; x++) {" +
    "var px = x*" + cs + "+" + pad + "; var py = y*" + cs + "+" + pad + ";" +
    "var pw = " + innerW + "; var ph = " + innerH + ";" +
    "var shape = '" + state.shape + "';" +
    "if (shape=='square') {" +
    "var r = g.pathItems.add(); r.name='px_'+x+'_'+y;" +
    "r.setEntirePath([[px,py],[px+pw,py],[px+pw,py+ph],[px,py+ph]]);" +
    "r.closed=true; r.filled=true; r.fillColor=fc; r.stroked=false;" +
    "} else if (shape=='circle') {" +
    "var e = g.pathItems.ellipse(py+ph, px, pw, ph);" +
    "e.name='px_'+x+'_'+y; e.filled=true; e.fillColor=fc; e.stroked=false;" +
    "} else {" +
    "var cx2=px+pw/2, cy2=py+ph/2, rx=pw/2, ry=ph/2;" +
    "var pts2=[]; for (var i=0;i<6;i++) { var ang=(Math.PI/3)*i-Math.PI/6;" +
    "pts2.push([cx2+rx*Math.cos(ang), cy2+ry*Math.sin(ang)]); }" +
    "var h = g.pathItems.add(); h.name='px_'+x+'_'+y;" +
    "h.setEntirePath(pts2); h.closed=true; h.filled=true; h.fillColor=fc; h.stroked=false;" +
    "}" +
    "}} app.redraw();" +
    "alert('\u0421\u043e\u0437\u0434\u0430\u043d\u043e: " + cols + "\u00d7" + rows + "'); }";

  csInterface.evalScript(script);
});

document.getElementById("importBtn").addEventListener("click", function() {
  document.getElementById("fileInput").click();
});

document.getElementById("fileInput").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var svgText = ev.target.result.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/\n/g, "\\n").replace(/\r/g, "");
    csInterface.evalScript("var f = new File('" + Folder.temp + "/import.svg'); f.open('w'); f.write('" + svgText + "'); f.close(); app.activeDocument.groupItems.createFromFile(f); f.remove(); app.redraw();");
  };
  reader.readAsText(file);
  e.target.value = "";
});

document.getElementById("exportBtn").addEventListener("click", function() {
  csInterface.evalScript("var f = File.saveDialog('Save SVG', 'SVG:*.svg'); if (f) { var o = new ExportOptionsSVG(); o.embedRasterImages=true; o.documentEncoding=SVGDocumentEncoding.UTF8; o.DTD=SVGDTDVersion.SVG1_1; o.coordinatePrecision=2; app.activeDocument.exportFile(f, ExportType.SVG, o); alert('Exported: ' + f.fsName); }");
});

render();
</script>
</body>
</html>
