<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;font-size:12px;background:#2c2c2c;color:#e0e0e0;padding:12px}
h2{font-size:13px;font-weight:600;margin-bottom:10px}
.sec{margin-bottom:12px}
.st{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.r{display:flex;align-items:center;gap:6px;margin-bottom:6px}
label{font-size:11px;color:#999;min-width:50px}
input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:#505050;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#e0e0e0;cursor:pointer}
.v{font-size:11px;font-weight:600;min-width:30px;text-align:right}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:7px 10px;border:1px solid #505050;border-radius:4px;background:#383838;color:#e0e0e0;font-size:11px;font-weight:500;cursor:pointer}
.btn:hover{background:#444}
.bp{background:#4caf50;color:#fff;border-color:#4caf50}
.bp:hover{background:#43a047}
.bg{display:flex}
.bg .btn{border-radius:0;margin-left:-1px;padding:5px 8px}
.bg .btn:first-child{border-radius:3px 0 0 3px;margin-left:0}
.bg .btn:last-child{border-radius:0 3px 3px 0}
.bg .btn.a{background:#4caf50;color:#fff;border-color:#4caf50;z-index:1}
.cs{width:28px;height:28px;border:1px solid #505050;border-radius:3px;cursor:pointer;position:relative;overflow:hidden}
.cs input[type=color]{position:absolute;top:-5px;left:-5px;width:40px;height:40px;border:none;cursor:pointer}
#pv{width:100%;aspect-ratio:1;background:#1a1a1a;border:1px solid #505050;border-radius:4px;margin-bottom:4px;overflow:hidden}
#pv svg{width:100%;height:100%}
.dl{font-size:10px;color:#999;text-align:center;margin-bottom:8px}
#dropzone{width:100%;min-height:50px;border:2px dashed #505050;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#666;font-size:11px;margin-bottom:6px;transition:border-color .2s}
#dropzone.over{border-color:#4caf50;color:#4caf50}
#dropzone.loaded{border-color:#4caf50;border-style:solid;color:#4caf50}
.row-btns{display:flex;gap:6px}
.row-btns .btn{flex:1}
</style>
</head>
<body>
<h2>Mimodots</h2>
<div class="sec">
<div class="st">Grid</div>
<div class="r"><label>W</label><input type="range" id="ws" min="8" max="256" value="32"><span class="v" id="wv">32</span></div>
<div class="r"><label>H</label><input type="range" id="hs" min="8" max="256" value="32"><span class="v" id="hv">32</span></div>
</div>
<div class="sec">
<div class="st">Shape</div>
<div class="bg">
<button class="btn a" data-s="square" style="flex:1">Square</button>
<button class="btn" data-s="circle" style="flex:1">Circle</button>
<button class="btn" data-s="hex" style="flex:1">Hex</button>
</div>
</div>
<div class="sec">
<div class="st">Style</div>
<div class="r"><label>Gap</label><input type="range" id="gs" min="0" max="50" value="10"><span class="v" id="gv">10%</span></div>
<div class="r"><label>Color</label><div class="cs"><input type="color" id="cp" value="#4caf50"></div><span class="v" id="cv">#4caf50</span></div>
</div>
<div class="sec">
<div class="st">Asset</div>
<div id="dropzone">Drag SVG here</div>
<div class="row-btns">
<button class="btn" id="grabBtn">Grab selection</button>
<button class="btn" id="resetBtn">Reset</button>
</div>
</div>
<div class="sec">
<div class="st">Preview</div>
<div id="pv"></div>
<div class="dl" id="dl">32 x 32</div>
</div>
<div class="sec">
<button class="btn bp" id="gb">Generate in Document</button>
</div>
<div class="sec">
<button class="btn" id="eb">Export as SVG</button>
</div>
<script src="./CSInterface.js"></script>
<script>
var S={w:32,h:32,s:"square",g:10,c:"#4caf50"};
var ns="http://www.w3.org/2000/svg";
var cs=new CSInterface();
var assetSVG=null;

document.querySelectorAll("[data-s]").forEach(function(b){b.addEventListener("click",function(){
document.querySelectorAll("[data-s]").forEach(function(x){x.classList.remove("a")});
b.classList.add("a");S.s=b.dataset.s;render()})});

document.getElementById("ws").addEventListener("input",function(){S.w=+this.value;document.getElementById("wv").textContent=S.w;dl();render()});
document.getElementById("hs").addEventListener("input",function(){S.h=+this.value;document.getElementById("hv").textContent=S.h;dl();render()});
document.getElementById("gs").addEventListener("input",function(){S.g=+this.value;document.getElementById("gv").textContent=S.g+"%";render()});
document.getElementById("cp").addEventListener("input",function(){S.c=this.value;document.getElementById("cv").textContent=S.c;render()});

function dl(){document.getElementById("dl").textContent=S.w+" x "+S.h}

function render(){
try{
var cols=S.w,rows=S.h,gf=S.g/100,c=10,pad=c*gf/2,inn=c-pad*2,sw=cols*c,sh=rows*c;
var svg=document.createElementNS(ns,"svg");
svg.setAttribute("viewBox","0 0 "+sw+" "+sh);
var bg=document.createElementNS(ns,"rect");
bg.setAttribute("width",sw);bg.setAttribute("height",sh);bg.setAttribute("fill","#1a1a1a");svg.appendChild(bg);

for(var x=0;x<=cols;x++){var l=document.createElementNS(ns,"line");l.setAttribute("x1",x*c);l.setAttribute("y1",0);l.setAttribute("x2",x*c);l.setAttribute("y2",sh);l.setAttribute("stroke","rgba(255,255,255,0.08)");l.setAttribute("stroke-width","0.3");svg.appendChild(l)}
for(var y=0;y<=rows;y++){var l2=document.createElementNS(ns,"line");l2.setAttribute("x1",0);l2.setAttribute("y1",y*c);l2.setAttribute("x2",sw);l2.setAttribute("y2",y*c);l2.setAttribute("stroke","rgba(255,255,255,0.08)");l2.setAttribute("stroke-width","0.3");svg.appendChild(l2)}

if(assetSVG){
try{
var parser=new DOMParser();
var svgDoc=parser.parseFromString(assetSVG,"image/svg+xml");
var errNode=svgDoc.querySelector("parsererror");
if(!errNode){
var imported=svgDoc.documentElement;
var vb=imported.getAttribute("viewBox");
if(!vb){
var w=parseFloat(imported.getAttribute("width"))||sw;
var h=parseFloat(imported.getAttribute("height"))||sh;
imported.setAttribute("viewBox","0 0 "+w+" "+h);
vb="0 0 "+w+" "+h;
}
var parts=vb.split(/[\s,]+/).map(Number);
var iw=parts[2],ih=parts[3];
if(iw>0&&ih>0){
var scale=Math.min(sw/iw,sh/ih);
var dw=iw*scale,dh=ih*scale;
var dx=(sw-dw)/2,dy=(sh-dh)/2;
imported.setAttribute("x",dx);
imported.setAttribute("y",dy);
imported.setAttribute("width",dw);
imported.setAttribute("height",dh);
imported.setAttribute("opacity","0.35");
imported.removeAttribute("class");
imported.removeAttribute("id");
svg.appendChild(imported);
}
}
}catch(e){}}

for(var py=0;py<rows;py++){for(var px=0;px<cols;px++){
var cx2=px*c+pad+inn/2,cy2=py*c+pad+inn/2,el;
if(S.s==="square"){el=document.createElementNS(ns,"rect");el.setAttribute("x",px*c+pad);el.setAttribute("y",py*c+pad);el.setAttribute("width",inn);el.setAttribute("height",inn)}
else if(S.s==="circle"){el=document.createElementNS(ns,"circle");el.setAttribute("cx",cx2);el.setAttribute("cy",cy2);el.setAttribute("r",inn/2)}
else{el=document.createElementNS(ns,"polygon");var pts=[];for(var i=0;i<6;i++){var a=(Math.PI/3)*i-Math.PI/6;pts.push((cx2+(inn/2)*Math.cos(a)).toFixed(2)+","+(cy2+(inn/2)*Math.sin(a)).toFixed(2))}el.setAttribute("points",pts.join(" "))}
if(el){el.setAttribute("fill",S.c);svg.appendChild(el)}}}

document.getElementById("pv").innerHTML="";
document.getElementById("pv").appendChild(svg);
}catch(e){document.getElementById("dl").textContent="Error: "+e.message}}

document.getElementById("gb").addEventListener("click",function(){
var cols=S.w,rows=S.h,c=10,gf=S.g/100,pad=c*gf/2,iw=c-pad*2,ih=c-pad*2;
var r=parseInt(S.c.slice(1,3),16),g=parseInt(S.c.slice(3,5),16),b=parseInt(S.c.slice(5,7),16);
var sh=S.s==="circle"?"ellipse":S.s==="hex"?"hex":"square";
cs.evalScript("generateGrid("+cols+","+rows+","+c+","+pad.toFixed(2)+","+iw.toFixed(2)+","+ih.toFixed(2)+","+r+","+g+","+b+",'"+sh+"')",function(res){
document.getElementById("dl").textContent=res||"Done";
})});

document.getElementById("grabBtn").addEventListener("click",function(){
cs.evalScript("getSelectedAsSVG()",function(res){
if(res&&res.indexOf("<")>=0){
assetSVG=res;
document.getElementById("dropzone").textContent="Loaded";
document.getElementById("dropzone").className="loaded";
render();
}
})});

document.getElementById("resetBtn").addEventListener("click",function(){
assetSVG=null;
document.getElementById("dropzone").textContent="Drag SVG here";
document.getElementById("dropzone").className="";
render();
});

var dz=document.getElementById("dropzone");
dz.addEventListener("dragover",function(e){e.preventDefault();dz.className="over"});
dz.addEventListener("dragleave",function(){if(assetSVG){dz.className="loaded"}else{dz.className=""}});
dz.addEventListener("drop",function(e){
e.preventDefault();
var files=e.dataTransfer.files;
if(files&&files.length>0){
var reader=new FileReader();
reader.onload=function(ev){
assetSVG=ev.target.result;
dz.textContent="Loaded";
dz.className="loaded";
render();
};
reader.readAsText(files[0]);
}
});

document.getElementById("eb").addEventListener("click",function(){cs.evalScript("exportSVG()")});
render();
</script>
</body>
</html>
