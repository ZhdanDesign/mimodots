<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
:root {
  --bg: #2c2c2c;
  --surface: #383838;
  --surface-hover: #444444;
  --border: #505050;
  --text: #e0e0e0;
  --text-muted: #999999;
  --accent: #4caf50;
  --accent-hover: #43a047;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  font-size: 12px;
  background: var(--bg);
  color: var(--text);
  padding: 10px;
  user-select: none;
}

h2 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.section {
  margin-bottom: 14px;
}

.section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

label {
  font-size: 11px;
  color: var(--text-muted);
  min-width: 50px;
}

input[type="range"] {
  flex: 1;
  height: 3px;
  -webkit-appearance: none;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--text);
  cursor: pointer;
}

.val {
  font-size: 11px;
  font-weight: 600;
  min-width: 30px;
  text-align: right;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.1s;
}

.btn:hover { background: var(--surface-hover); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-primary:hover { background: var(--accent-hover); }

.btn-group {
  display: flex;
  gap: 0;
}

.btn-group .btn {
  border-radius: 0;
  margin-left: -1px;
  padding: 5px 8px;
}

.btn-group .btn:first-child { border-radius: 3px 0 0 3px; margin-left: 0; }
.btn-group .btn:last-child { border-radius: 0 3px 3px 0; }

.btn-group .btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  z-index: 1;
}

.color-input {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  background: none;
  padding: 1px;
}

.color-input::-webkit-color-swatch-wrapper { padding: 0; }
.color-input::-webkit-color-swatch { border: none; border-radius: 2px; }

.sep {
  height: 1px;
  background: var(--border);
  margin: 10px 0;
}

canvas {
  width: 100%;
  aspect-ratio: 1;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 6px;
}

.dim-label {
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 10px;
}

#fileInput { display: none; }
</style>
</head>
<body>

<h2>Mimodots — Пиксельная сетка</h2>

<div class="section">
  <div class="section-title">Размер сетки</div>
  <div class="row">
    <label>Ширина</label>
    <input type="range" id="widthSlider" min="8" max="256" value="32">
    <span class="val" id="widthVal">32</span>
  </div>
  <div class="row">
    <label>Высота</label>
    <input type="range" id="heightSlider" min="8" max="256" value="32">
    <span class="val" id="heightVal">32</span>
  </div>
  <div class="row" style="margin-top:4px">
    <label>Формат</label>
    <div class="btn-group" style="flex:1">
      <button class="btn active" data-ratio="free" style="flex:1">Свободный</button>
      <button class="btn" data-ratio="square" style="flex:1">1:1</button>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">Форма пикселей</div>
  <div class="btn-group">
    <button class="btn active" data-shape="square" style="flex:1">■ Квадрат</button>
    <button class="btn" data-shape="circle" style="flex:1">● Круг</button>
    <button class="btn" data-shape="hex" style="flex:1">⬡ Грань</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Внешний вид</div>
  <div class="row">
    <label>Зазор</label>
    <input type="range" id="gapSlider" min="0" max="50" value="10">
    <span class="val" id="gapVal">10%</span>
  </div>
  <div class="row">
    <label>Цвет</label>
    <input type="color" class="color-input" id="colorPicker" value="#4caf50">
    <span class="val" id="colorVal">#4caf50</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Превью</div>
  <canvas id="preview"></canvas>
  <div class="dim-label" id="dimLabel">32 × 32</div>
</div>

<div class="section">
  <button class="btn" id="importBtn" style="margin-bottom:6px">📁 Импорт SVG в документ</button>
  <input type="file" id="fileInput" accept=".svg,image/svg+xml">
  <button class="btn btn-primary" id="generateBtn">⚡ Создать пиксельную сетку</button>
</div>

<div class="sep"></div>

<div class="section">
  <button class="btn" id="exportBtn">⬇ Экспорт выделения как SVG</button>
</div>

<script>
(function() {
  let csInterface = null;
  try {
    csInterface = new CSInterface();
  } catch(e) {
    console.log('CSInterface not available (running outside Illustrator)');
  }

  const state = {
    width: 32,
    height: 32,
    ratio: 'free',
    shape: 'square',
    gap: 10,
    color: '#4caf50'
  };

  const canvas = document.getElementById('preview');
  const ctx = canvas.getContext('2d');

  document.querySelectorAll('[data-ratio]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-ratio]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.ratio = btn.dataset.ratio;
      if (state.ratio === 'square') {
        state.height = state.width;
        document.getElementById('heightSlider').value = state.height;
        document.getElementById('heightVal').textContent = state.height;
      }
      updateDim();
      render();
    });
  });

  document.querySelectorAll('[data-shape]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-shape]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.shape = btn.dataset.shape;
      render();
    });
  });

  document.getElementById('widthSlider').addEventListener('input', function() {
    state.width = parseInt(this.value);
    document.getElementById('widthVal').textContent = state.width;
    if (state.ratio === 'square') {
      state.height = state.width;
      document.getElementById('heightSlider').value = state.height;
      document.getElementById('heightVal').textContent = state.height;
    }
    updateDim();
    render();
  });

  document.getElementById('heightSlider').addEventListener('input', function() {
    state.height = parseInt(this.value);
    document.getElementById('heightVal').textContent = state.height;
    if (state.ratio === 'square') {
      state.width = state.height;
      document.getElementById('widthSlider').value = state.width;
      document.getElementById('widthVal').textContent = state.width;
    }
    updateDim();
    render();
  });

  document.getElementById('gapSlider').addEventListener('input', function() {
    state.gap = parseInt(this.value);
    document.getElementById('gapVal').textContent = state.gap + '%';
    render();
  });

  document.getElementById('colorPicker').addEventListener('input', function() {
    state.color = this.value;
    document.getElementById('colorVal').textContent = state.color;
    render();
  });

  function updateDim() {
    document.getElementById('dimLabel').textContent = state.width + ' × ' + state.height;
  }

  function render() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const cw = rect.width;
    const ch = rect.height;
    const cols = state.width;
    const rows = state.height;
    const cellW = cw / cols;
    const cellH = ch / rows;
    const gapFrac = state.gap / 100;
    const padX = cellW * gapFrac / 2;
    const padY = cellH * gapFrac / 2;

    ctx.clearRect(0, 0, cw, ch);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, cw, ch);

    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= cols; x++) {
      ctx.beginPath();
      ctx.moveTo(x * cellW, 0);
      ctx.lineTo(x * cellW, ch);
      ctx.stroke();
    }
    for (let y = 0; y <= rows; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * cellH);
      ctx.lineTo(cw, y * cellH);
      ctx.stroke();
    }

    ctx.fillStyle = state.color;
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const px = x * cellW + padX;
        const py = y * cellH + padY;
        const pw = cellW - padX * 2;
        const ph = cellH - padY * 2;

        if (state.shape === 'square') {
          ctx.fillRect(px, py, pw, ph);
        } else if (state.shape === 'circle') {
          ctx.beginPath();
          ctx.ellipse(px + pw/2, py + ph/2, pw/2, ph/2, 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (state.shape === 'hex') {
          drawHex(ctx, px + pw/2, py + ph/2, pw/2, ph/2);
        }
      }
    }
  }

  function drawHex(ctx, cx, cy, rx, ry) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i - Math.PI / 6;
      const x = cx + rx * Math.cos(angle);
      const y = cy + ry * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  function evalScript(script) {
    if (csInterface) {
      csInterface.evalScript(script);
    } else {
      console.log('Script:', script);
      alert('Плагин работает только внутри Adobe Illustrator');
    }
  }

  document.getElementById('generateBtn').addEventListener('click', () => {
    const cols = state.width;
    const rows = state.height;
    const cellSize = 10;
    const gapFrac = state.gap / 100;
    const pad = cellSize * gapFrac / 2;
    const innerW = cellSize - pad * 2;
    const innerH = cellSize - pad * 2;
    const color = state.color;
    const r = parseInt(color.slice(1,3), 16);
    const g = parseInt(color.slice(3,5), 16);
    const b = parseInt(color.slice(5,7), 16);

    let shapeType = 'square';
    if (state.shape === 'circle') shapeType = 'ellipse';
    if (state.shape === 'hex') shapeType = 'polygon';

    const script = `generatePixelGrid(${cols}, ${rows}, ${cellSize}, ${pad}, ${innerW}, ${innerH}, ${r}, ${g}, ${b}, '${shapeType}')`;
    evalScript(script);
  });

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const svgText = ev.target.result
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '');
      evalScript(`importSVGString('${svgText}')`);
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    evalScript('exportSelectionAsSVG()');
  });

  render();
})();
</script>

</body>
</html>
