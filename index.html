<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Grid Icon Generator</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface-hover: #1a2744;
  --border: #0f3460;
  --text: #e0e0e0;
  --text-muted: #8892a4;
  --accent: #00b4d8;
  --accent-hover: #0096c7;
  --grid-line: rgba(255,255,255,0.06);
  --canvas-bg: #0d1117;
  --input-bg: #0f1729;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface-hover: #f8f9fa;
  --border: #dee2e6;
  --text: #212529;
  --text-muted: #6c757d;
  --accent: #0077b6;
  --accent-hover: #005f8a;
  --grid-line: rgba(0,0,0,0.08);
  --canvas-bg: #ffffff;
  --input-bg: #f8f9fa;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 2rem 1rem;
}

.container {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  box-shadow: var(--shadow);
}

.row {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.row-between {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

h1 {
  font-size: 1.25rem;
  font-weight: 600;
  text-align: center;
  letter-spacing: -0.02em;
}

label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--surface);
}

input[type="range"]::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--surface);
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.slider-row input[type="range"] { flex: 1; }

.slider-val {
  font-size: 0.85rem;
  font-weight: 600;
  min-width: 3ch;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.btn:hover { background: var(--surface-hover); }

.btn-accent {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-accent:hover { background: var(--accent-hover); }

.btn-group {
  display: flex;
  gap: 0;
}

.btn-group .btn {
  border-radius: 0;
  margin-left: -1px;
}

.btn-group .btn:first-child { border-radius: 8px 0 0 8px; margin-left: 0; }
.btn-group .btn:last-child { border-radius: 0 8px 8px 0; }

.btn-group .btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  z-index: 1;
}

.color-input {
  width: 36px;
  height: 36px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  background: none;
  padding: 2px;
}

.color-input::-webkit-color-swatch-wrapper { padding: 0; }
.color-input::-webkit-color-swatch { border: none; border-radius: 4px; }

.canvas-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  background: var(--canvas-bg);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.canvas-wrap canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

#importInput { display: none; }

.dim-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-align: center;
}

svg { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="row-between">
      <h1>Pixel Grid Generator</h1>
      <button class="btn" id="themeBtn" title="Toggle theme">☀️</button>
    </div>
  </div>

  <div class="card">
    <div class="row-between" style="margin-bottom:1rem">
      <label>Aspect Ratio</label>
      <div class="btn-group">
        <button class="btn active" data-ratio="square">1:1</button>
        <button class="btn" data-ratio="vertical">↕ V</button>
        <button class="btn" data-ratio="horizontal">↔ H</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.75rem">
      <div class="slider-row">
        <label style="min-width:4.5rem">Width</label>
        <input type="range" id="widthSlider" min="16" max="640" step="1" value="64">
        <span class="slider-val" id="widthVal">64</span>
      </div>
      <div class="slider-row">
        <label style="min-width:4.5rem">Height</label>
        <input type="range" id="heightSlider" min="16" max="640" step="1" value="64">
        <span class="slider-val" id="heightVal">64</span>
      </div>
    </div>
  </div>

  <div class="card" style="padding:0.75rem">
    <div class="canvas-wrap">
      <canvas id="gridCanvas"></canvas>
    </div>
    <div class="dim-label" id="dimLabel">64 × 64</div>
  </div>

  <div class="card">
    <div class="row-between" style="margin-bottom:1rem">
      <button class="btn btn-accent" id="importBtn">📁 Import SVG</button>
      <input type="file" id="importInput" accept=".svg,image/svg+xml">
      <div class="btn-group">
        <button class="btn active" data-shape="square" title="Square">■</button>
        <button class="btn" data-shape="circle" title="Circle">●</button>
        <button class="btn" data-shape="hexagon" title="Hexagon">⬡</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.75rem">
      <div class="slider-row">
        <label style="min-width:4.5rem">Gap</label>
        <input type="range" id="gapSlider" min="0" max="50" step="1" value="10">
        <span class="slider-val" id="gapVal">10%</span>
      </div>
      <div class="slider-row">
        <label style="min-width:4.5rem">Color</label>
        <input type="color" class="color-input" id="colorPicker" value="#00b4d8">
        <span class="slider-val" id="colorVal">#00b4d8</span>
      </div>
    </div>
  </div>

  <div class="card" style="text-align:center">
    <button class="btn btn-accent" id="exportBtn" style="width:100%;justify-content:center;padding:0.75rem">⬇ Export SVG</button>
  </div>
</div>

<script>
(function() {
  const state = {
    width: 64,
    height: 64,
    ratio: 'square',
    shape: 'square',
    gap: 10,
    color: '#00b4d8',
    active: new Set(),
    theme: localStorage.getItem('pixel-theme') || 'dark'
  };

  const canvas = document.getElementById('gridCanvas');
  const ctx = canvas.getContext('2d');
  const widthSlider = document.getElementById('widthSlider');
  const heightSlider = document.getElementById('heightSlider');
  const widthVal = document.getElementById('widthVal');
  const heightVal = document.getElementById('heightVal');
  const gapSlider = document.getElementById('gapSlider');
  const gapVal = document.getElementById('gapVal');
  const colorPicker = document.getElementById('colorPicker');
  const colorVal = document.getElementById('colorVal');
  const dimLabel = document.getElementById('dimLabel');
  const importBtn = document.getElementById('importBtn');
  const importInput = document.getElementById('importInput');
  const exportBtn = document.getElementById('exportBtn');
  const themeBtn = document.getElementById('themeBtn');

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('pixel-theme', t);
    state.theme = t;
  }

  applyTheme(state.theme);

  themeBtn.addEventListener('click', () => {
    applyTheme(state.theme === 'dark' ? 'light' : 'dark');
    render();
  });

  document.querySelectorAll('[data-ratio]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-ratio]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.ratio = btn.dataset.ratio;
      syncSliders();
      render();
    });
  });

  document.querySelectorAll('[data-shape]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-shape]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.shape = btn.dataset.shape;
      render();
    });
  });

  function syncSliders() {
    if (state.ratio === 'square') {
      const v = parseInt(widthSlider.value);
      heightSlider.value = v;
      state.height = v;
      heightVal.textContent = v;
    } else if (state.ratio === 'vertical') {
      const w = parseInt(widthSlider.value);
      const h = Math.min(640, Math.round(w * 1.5));
      heightSlider.value = h;
      state.height = h;
      heightVal.textContent = h;
    } else {
      const h = parseInt(heightSlider.value);
      const w = Math.min(640, Math.round(h * 1.5));
      widthSlider.value = w;
      state.width = w;
      widthVal.textContent = w;
    }
    dimLabel.textContent = `${state.width} × ${state.height}`;
  }

  widthSlider.addEventListener('input', () => {
    state.width = parseInt(widthSlider.value);
    widthVal.textContent = state.width;
    if (state.ratio === 'square') {
      state.height = state.width;
      heightSlider.value = state.height;
      heightVal.textContent = state.height;
    } else if (state.ratio === 'vertical') {
      state.height = Math.min(640, Math.round(state.width * 1.5));
      heightSlider.value = state.height;
      heightVal.textContent = state.height;
    }
    dimLabel.textContent = `${state.width} × ${state.height}`;
    render();
  });

  heightSlider.addEventListener('input', () => {
    state.height = parseInt(heightSlider.value);
    heightVal.textContent = state.height;
    if (state.ratio === 'square') {
      state.width = state.height;
      widthSlider.value = state.width;
      widthVal.textContent = state.width;
    } else if (state.ratio === 'horizontal') {
      state.width = Math.min(640, Math.round(state.height * 1.5));
      widthSlider.value = state.width;
      widthVal.textContent = state.width;
    }
    dimLabel.textContent = `${state.width} × ${state.height}`;
    render();
  });

  gapSlider.addEventListener('input', () => {
    state.gap = parseInt(gapSlider.value);
    gapVal.textContent = state.gap + '%';
    render();
  });

  colorPicker.addEventListener('input', () => {
    state.color = colorPicker.value;
    colorVal.textContent = state.color;
    render();
  });

  function resizeCanvas() {
    const wrap = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = wrap.clientWidth * dpr;
    canvas.height = wrap.clientHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function render() {
    resizeCanvas();
    const cw = canvas.width / (window.devicePixelRatio || 1);
    const ch = canvas.height / (window.devicePixelRatio || 1);
    const cols = state.width;
    const rows = state.height;
    const cellW = cw / cols;
    const cellH = ch / rows;
    const gapPx = state.gap / 100;
    const padX = cellW * gapPx / 2;
    const padY = cellH * gapPx / 2;

    ctx.clearRect(0, 0, cw, ch);

    const isLight = state.theme === 'light';
    ctx.fillStyle = isLight ? '#ffffff' : '#0d1117';
    ctx.fillRect(0, 0, cw, ch);

    ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= cols; x++) {
      ctx.beginPath();
      ctx.moveTo(x * cellW, 0);
      ctx.lineTo(x * cellW, ch);
      ctx.stroke();
    }
    for (let y = 0; y <= rows; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * cellH);
      ctx.lineTo(cw, y * cellH);
      ctx.stroke();
    }

    const r = parseInt(state.color.slice(1, 3), 16);
    const g = parseInt(state.color.slice(3, 5), 16);
    const b = parseInt(state.color.slice(5, 7), 16);
    ctx.fillStyle = state.color;

    for (const key of state.active) {
      const [cx, cy] = key.split(',').map(Number);
      const px = cx * cellW + padX;
      const py = cy * cellH + padY;
      const pw = cellW - padX * 2;
      const ph = cellH - padY * 2;

      if (state.shape === 'square') {
        ctx.fillRect(px, py, pw, ph);
      } else if (state.shape === 'circle') {
        ctx.beginPath();
        ctx.ellipse(px + pw / 2, py + ph / 2, pw / 2, ph / 2, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (state.shape === 'hexagon') {
        const hx = px + pw / 2;
        const hy = py + ph / 2;
        const rx = pw / 2;
        const ry = ph / 2;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i - Math.PI / 6;
          const x = hx + rx * Math.cos(angle);
          const y = hy + ry * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  importBtn.addEventListener('click', () => importInput.click());

  importInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const svgText = ev.target.result;
      traceSVG(svgText);
      render();
    };
    reader.readAsText(file);
    importInput.value = '';
  });

  function traceSVG(svgText) {
    const cols = state.width;
    const rows = state.height;
    state.active.clear();

    const img = new Image();
    const blob = new Blob([svgText], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);

    img.onload = () => {
      const off = document.createElement('canvas');
      off.width = cols;
      off.height = rows;
      const octx = off.getContext('2d');
      octx.drawImage(img, 0, 0, cols, rows);
      const data = octx.getImageData(0, 0, cols, rows).data;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i = (y * cols + x) * 4;
          const a = data[i + 3];
          const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
          if (a > 30 && brightness < 200) {
            state.active.add(`${x},${y}`);
          }
        }
      }
      URL.revokeObjectURL(url);
      render();
    };
    img.src = url;
  }

  exportBtn.addEventListener('click', exportSVG);

  function exportSVG() {
    const cols = state.width;
    const rows = state.height;
    const cellSize = 10;
    const svgW = cols * cellSize;
    const svgH = rows * cellSize;
    const gapFrac = state.gap / 100;
    const pad = cellSize * gapFrac / 2;
    const innerW = cellSize - pad * 2;
    const innerH = cellSize - pad * 2;

    const parts = [];
    parts.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}">`);

    for (const key of state.active) {
      const [cx, cy] = key.split(',').map(Number);
      const x = cx * cellSize + pad;
      const y = cy * cellSize + pad;

      if (state.shape === 'square') {
        parts.push(`<rect x="${x}" y="${y}" width="${innerW}" height="${innerH}" fill="${state.color}"/>`);
      } else if (state.shape === 'circle') {
        parts.push(`<ellipse cx="${x + innerW / 2}" cy="${y + innerH / 2}" rx="${innerW / 2}" ry="${innerH / 2}" fill="${state.color}"/>`);
      } else if (state.shape === 'hexagon') {
        const hx = x + innerW / 2;
        const hy = y + innerH / 2;
        const rx = innerW / 2;
        const ry = innerH / 2;
        const pts = [];
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i - Math.PI / 6;
          pts.push(`${(hx + rx * Math.cos(angle)).toFixed(2)},${(hy + ry * Math.sin(angle)).toFixed(2)}`);
        }
        parts.push(`<polygon points="${pts.join(' ')}" fill="${state.color}"/>`);
      }
    }

    parts.push('</svg>');

    const svgContent = parts.join('\n');
    const blob = new Blob([svgContent], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pixel-icon-${cols}x${rows}.svg`;
    a.click();
    URL.revokeObjectURL(url);
  }

  syncSliders();
  render();

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 50);
  });
})();
</script>

</body>
</html>
